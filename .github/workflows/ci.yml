name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    name: Rust fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # compose-core / the host pull secure-log from the private
      # tegmentum/secure-log repo. .cargo/config.toml sets
      # git-fetch-with-cli, so cargo's git CLI honors this token. Provide a
      # repo:read PAT as the TEGMENTUM_CI_TOKEN secret.
      - name: Authenticate private git dependencies
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.TEGMENTUM_CI_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
      - name: Detect Cargo workspaces
        id: cargo
        run: |
          if git ls-files --error-unmatch "Cargo.toml" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      # Install the toolchain pinned by rust-toolchain.toml (channel +
      # rustfmt/clippy/target), so the fmt and clippy gates are
      # deterministic instead of tracking the latest nightly. `rustup show`
      # materializes it. GitHub's hosted runners ship rustup; bootstrap it
      # if absent (e.g. running under act with a minimal image).
      - name: Install pinned Rust toolchain
        if: steps.cargo.outputs.found == 'true'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup show
      - name: cargo fmt --check
        if: steps.cargo.outputs.found == 'true'
        run: cargo fmt --all -- --check
      - name: cargo clippy
        if: steps.cargo.outputs.found == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings
      # Build the runtime-linking example components so the dynlink and
      # runtime_linking tests actually execute (they skip gracefully when
      # the wasm32-wasip2 artifacts are absent). These examples depend only
      # on wit-bindgen, so no private-dependency token is needed.
      - name: Build dynlink example components
        if: steps.cargo.outputs.found == 'true'
        run: |
          (cd examples/dynlink-echo-provider && cargo build --release --target wasm32-wasip2)
          (cd examples/dynlink-endpoint-consumer && cargo build --release --target wasm32-wasip2)
          (cd examples/dynlink-dlopen-guest && cargo build --release --target wasm32-wasip2)
          (cd examples/hello-component && cargo build --release --target wasm32-wasip2)
      - name: cargo test
        if: steps.cargo.outputs.found == 'true'
        run: cargo test --all
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - name: Build placeholder component
        run: ./scripts/build-placeholder.sh

  composectl-validation:
    name: composectl plan validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate private git dependencies
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.TEGMENTUM_CI_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
      - name: Detect composectl manifest
        id: ctl
        run: |
          if git ls-files --error-unmatch "tools/composectl/Cargo.toml" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install pinned Rust toolchain
        if: steps.ctl.outputs.found == 'true'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup show
      - name: Build composectl
        if: steps.ctl.outputs.found == 'true'
        working-directory: tools/composectl
        run: cargo build --release
      - name: Smoke test composectl plan validation
        if: steps.ctl.outputs.found == 'true'
        working-directory: tools/composectl
        run: |
          if ls ../../conformance/vectors/*.cbor >/dev/null 2>&1; then
            for plan in ../../conformance/vectors/*.cbor; do
              ./target/release/composectl plan validate "$plan"
            done
          else
            echo "No canonical vectors yet; skipping"
          fi
      - name: Run conformance runner summary
        if: steps.ctl.outputs.found == 'true'
        run: |
          mkdir -p artifacts
          cargo run -p conformance-runner -- run --json artifacts/conformance-summary.json
        env:
          CARGO_BIN_EXE_composectl: ${{ github.workspace }}/tools/composectl/target/release/composectl
      - name: Upload conformance summary
        if: steps.ctl.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: conformance-summary
          path: artifacts/conformance-summary.json
