name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    name: Rust fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # compose-core / the host pull secure-log from the private
      # tegmentum/secure-log repo. .cargo/config.toml sets
      # git-fetch-with-cli, so cargo's git CLI honors this token. Provide a
      # repo:read PAT as the TEGMENTUM_CI_TOKEN secret.
      - name: Authenticate private git dependencies
        env:
          TOKEN: ${{ secrets.TEGMENTUM_CI_TOKEN }}
        run: |
          # Only rewrite to token auth when a token is provided. The git
          # dependencies (tegmentum/secure-log, tegmentum/wasm-tools) are
          # public, so a tokenless run fetches them anonymously; an empty
          # token would otherwise turn anonymous reads into failed auth.
          if [ -n "$TOKEN" ]; then
            git config --global \
              url."https://x-access-token:${TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          else
            echo "No TEGMENTUM_CI_TOKEN set; fetching git dependencies anonymously."
          fi
      - name: Detect Cargo workspaces
        id: cargo
        run: |
          if git ls-files --error-unmatch "Cargo.toml" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      # Install the toolchain pinned by rust-toolchain.toml (channel +
      # rustfmt/clippy/target), so the fmt and clippy gates are
      # deterministic instead of tracking the latest nightly. `rustup show`
      # materializes it. GitHub's hosted runners ship rustup; bootstrap it
      # if absent (e.g. running under act with a minimal image).
      - name: Install pinned Rust toolchain
        if: steps.cargo.outputs.found == 'true'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup show
      - name: cargo fmt --check
        if: steps.cargo.outputs.found == 'true'
        run: cargo fmt --all -- --check
      - name: cargo clippy
        if: steps.cargo.outputs.found == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings
      # Build the runtime-linking example components so the dynlink and
      # runtime_linking tests actually execute (they skip gracefully when
      # the wasm32-wasip2 artifacts are absent). These examples depend only
      # on wit-bindgen, so no private-dependency token is needed.
      - name: Build dynlink example components
        if: steps.cargo.outputs.found == 'true'
        run: |
          (cd examples/dynlink-echo-provider && cargo build --release --target wasm32-wasip2)
          (cd examples/dynlink-endpoint-consumer && cargo build --release --target wasm32-wasip2)
          (cd examples/dynlink-dlopen-guest && cargo build --release --target wasm32-wasip2)
          (cd examples/hello-component && cargo build --release --target wasm32-wasip2)
          # hello-http (wasi:http) for the http-server feature test; its WIT
          # deps are vendored, so this builds offline.
          (cd examples/hello-http && cargo build --release --target wasm32-wasip2)
      # Linking the host binaries (wasmtime + aws-lc + reqwest + sigstore +
      # pgp) is memory-heavy; debug info dominates the linker's footprint and
      # several test binaries link in parallel. Drop debuginfo in CI so the
      # link fits on memory-constrained runners (GitHub ~7 GiB; local act).
      - name: cargo test
        if: steps.cargo.outputs.found == 'true'
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test --all
      - name: cargo test (http-server feature)
        if: steps.cargo.outputs.found == 'true'
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
        run: cargo test -p compose-host-wasmtime --features http-server --test http_exec
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - name: Build placeholder component
        run: ./scripts/build-placeholder.sh

  cargo-audit:
    name: cargo audit (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo audit only reads Cargo.lock + the RustSec advisory DB; it does
      # not fetch crate sources, so no private-dependency token is needed.
      # Accepted/no-fix advisories are documented in .cargo/audit.toml.
      - name: Install pinned Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup show
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  composectl-validation:
    name: composectl plan validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate private git dependencies
        env:
          TOKEN: ${{ secrets.TEGMENTUM_CI_TOKEN }}
        run: |
          # Only rewrite to token auth when a token is provided. The git
          # dependencies (tegmentum/secure-log, tegmentum/wasm-tools) are
          # public, so a tokenless run fetches them anonymously; an empty
          # token would otherwise turn anonymous reads into failed auth.
          if [ -n "$TOKEN" ]; then
            git config --global \
              url."https://x-access-token:${TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          else
            echo "No TEGMENTUM_CI_TOKEN set; fetching git dependencies anonymously."
          fi
      - name: Detect composectl manifest
        id: ctl
        run: |
          if git ls-files --error-unmatch "tools/composectl/Cargo.toml" >/dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install pinned Rust toolchain
        if: steps.ctl.outputs.found == 'true'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup show
      # composectl is a workspace member: the binary lands in the workspace-root
      # target/, not tools/composectl/target/.
      - name: Build composectl
        if: steps.ctl.outputs.found == 'true'
        run: cargo build --release -p composectl
      # The conformance runner is the validation gate: it feeds every vector to
      # `composectl plan validate` and checks the outcome (pass/reject) against
      # conformance/vectors/fixtures.json, including the negative fixtures.
      - name: Run conformance runner summary
        if: steps.ctl.outputs.found == 'true'
        run: |
          mkdir -p artifacts
          cargo run -p conformance-runner -- run --json artifacts/conformance-summary.json
        env:
          CARGO_BIN_EXE_composectl: ${{ github.workspace }}/target/release/composectl
      - name: Upload conformance summary
        if: steps.ctl.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: conformance-summary
          path: artifacts/conformance-summary.json
