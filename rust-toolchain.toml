# Pin the toolchain so the fmt and clippy gates are deterministic across
# local dev and CI. Nightly is required for the rustfmt formatting the
# repo is written against. Bump deliberately (and re-run `cargo fmt`) when
# adopting a newer nightly.
[toolchain]
channel = "nightly-2026-04-16"
components = ["rustfmt", "clippy"]
# Needed to build the dynlink example components (and any wasm32-wasip2
# guest) so the runtime-linking tests run in CI.
targets = ["wasm32-wasip2"]
